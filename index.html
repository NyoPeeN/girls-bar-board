<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付け回し管理ボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;color:#222;font-size:14px}
.shop-tabs{display:flex;gap:4px;padding:10px 12px 0;background:#222;border-bottom:2px solid #444}
.shop-tab{padding:8px 20px;cursor:pointer;border-radius:6px 6px 0 0;color:#aaa;background:transparent;border:none;font-size:14px}
.shop-tab.active{background:#f5f5f5;color:#222;font-weight:600}
.inner-tabs{display:flex;gap:4px;padding:8px 12px 0;background:#fff;border-bottom:1px solid #ddd}
.inner-tab{padding:6px 16px;cursor:pointer;border-radius:6px 6px 0 0;color:#888;background:transparent;border:1px solid transparent;font-size:13px}
.inner-tab.active{border-color:#ddd;border-bottom:1px solid #fff;color:#222;font-weight:500;background:#fff}
.panel{display:none;padding:12px}
.panel.active{display:block}
.btn{padding:5px 12px;font-size:12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#222}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5}
.btn.danger{background:#ffeaea;color:#a32d2d;border-color:#f09595}
.btn.warn{background:#faeeda;color:#854f0b;border-color:#ef9f27}
.btn.info{background:#e6f1fb;color:#185fa5;border-color:#85b7eb}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;position:relative}
.card.active-staff{border-color:#5dcaa5;background:#e1f5ee}
.card-name{font-size:13px;font-weight:500}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.badge.free{background:#e1f5ee;color:#0f6e56}
.badge.busy{background:#faeeda;color:#854f0b}
.badge.off{background:#f0f0f0;color:#888}
.course-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:8px}
.course-card.done-card{opacity:0.5}
.course-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.course-num{font-size:16px;font-weight:700;min-width:24px}
.half-block{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.half{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px}
.half-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.half-time{font-size:11px;color:#185fa5;margin-bottom:4px}
.half-girls{display:flex;flex-wrap:wrap;gap:4px;min-height:22px}
.girl-chip{display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ddd;border-radius:20px;padding:2px 7px;font-size:12px}
.girl-chip .remove{cursor:pointer;color:#aaa;font-size:10px}
.girl-chip .remove:hover{color:#a32d2d}
.timeline{display:flex;gap:5px;flex-wrap:wrap}
.tl-item{padding:3px 9px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#f9f9f9}
.tl-item.done{background:#ffeaea;border-color:#f09595;color:#a32d2d;font-weight:500}
.tl-item.soon{background:#faeeda;border-color:#ef9f27;color:#854f0b;font-weight:500}
.tl-item.extended{background:#e1f5ee;border-color:#5dcaa5;color:#0f6e56;font-weight:500}
.status-table{width:100%;border-collapse:collapse}
.status-table th{text-align:left;font-size:12px;color:#888;font-weight:500;padding:5px 7px;border-bottom:1px solid #eee}
.status-table td{padding:7px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
.status-table tr:last-child td{border-bottom:none}
.overlap-badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:11px;background:#ffeaea;color:#a32d2d;border:1px solid #f09595;margin-left:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:18px;width:280px;max-width:92vw;max-height:80vh;overflow-y:auto}
.modal h4{font-size:14px;font-weight:600;margin-bottom:12px}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:8px}
.modal input,.modal select{width:100%;font-size:13px;padding:6px 9px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#222}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.girl-check-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;border:1px solid #eee;border-radius:6px;padding:7px}
.girl-check-item{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
.girl-check-item input{width:15px;height:15px;cursor:pointer}
.empty{text-align:center;padding:30px;color:#aaa;font-size:13px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.free{background:#1d9e75}
.dot.busy{background:#ef9f27}
</style>
</head>
<body>

<div class="shop-tabs">
  <button class="shop-tab active" onclick="switchShop(0)" id="shopTab0">ANUBIS</button>
  <button class="shop-tab" onclick="switchShop(1)" id="shopTab1">BASTET</button>
</div>
<div id="shopPanel0"></div>
<div id="shopPanel1" style="display:none"></div>

<div class="modal-overlay" id="modalAddStaff">
  <div class="modal">
    <h4>スタッフ追加</h4>
    <label>名前</label>
    <input id="inputStaffName" type="text" placeholder="名前を入力" />
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAddStaff')">キャンセル</button>
      <button class="btn primary" onclick="confirmAddStaff()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAddCourse">
  <div class="modal">
    <h4>コース追加</h4>
    <label>コース種別</label>
    <select id="inputCourseType">
      <option value="40">40分コース</option>
      <option value="60">60分コース</option>
    </select>
    <label>スタート時間</label>
    <input id="inputCourseStart" type="time" />
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAddCourse')">キャンセル</button>
      <button class="btn primary" onclick="confirmAddCourse()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAssign">
  <div class="modal">
    <h4 id="modalAssignTitle">女の子をアサイン</h4>
    <div id="girlCheckList" class="girl-check-list"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAssign')">キャンセル</button>
      <button class="btn primary" onclick="confirmAssign()">セット</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalExtend">
  <div class="modal">
    <h4>延長</h4>
    <label>延長時間</label>
    <select id="inputExtend"></select>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalExtend')">キャンセル</button>
      <button class="btn primary" onclick="confirmExtend()">延長</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalEditTime">
  <div class="modal">
    <h4>スタート時間を編集</h4>
    <label>スタート時間</label>
    <input id="inputEditTime" type="time" />
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalEditTime')">キャンセル</button>
      <button class="btn primary" onclick="confirmEditTime()">更新</button>
    </div>
  </div>
</div>

<script>
const shops=[
  {name:'ANUBIS',extOptions:[20,40],staff:[],courses:[],innerTab:0},
  {name:'BASTET',extOptions:[30,60],staff:[],courses:[],innerTab:0}
];
let currentShop=0;
let pendingShop=null,pendingCourseIdx=null,pendingHalf=null,pendingExtCourse=null,pendingEditCourse=null;

function save(){localStorage.setItem('gbv3',JSON.stringify(shops.map(s=>({name:s.name,extOptions:s.extOptions,staff:s.staff,courses:s.courses,innerTab:s.innerTab||0}))))}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('gbv3'));
    if(d){d.forEach((s,i)=>{shops[i].staff=s.staff||[];shops[i].courses=s.courses||[];shops[i].innerTab=s.innerTab||0;});}
  }catch(e){}
}

function pad(n){return String(n).padStart(2,'0')}
function toMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function toTime(m){return pad(Math.floor(((m%1440)+1440)%1440/60))+':'+pad(((m%1440)+1440)%1440%60)}
function nowStr(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes())}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function tlClass(t){const diff=toMins(t)-nowMins();if(diff<=0)return'done';if(diff<=5)return'soon';return''}

function getSchedule(course){
  const sm=toMins(course.start);
  const base=course.type;
  const ext=course.extended||0;
  const total=base+ext;
  return{
    change:toTime(sm+base/2),
    extNeg:toTime(sm+base-5),
    end:toTime(sm+total)
  };
}

function getStaffRange(course,name){
  const sc=getSchedule(course);
  const inFirst=course.firstHalf.includes(name);
  const inSecond=course.secondHalf.includes(name);
  if(inFirst&&inSecond)return{start:course.start,end:sc.end};
  if(inFirst)return{start:course.start,end:sc.change};
  if(inSecond)return{start:sc.change,end:sc.end};
  return null;
}

function hasOverlap(courses,name){
  const ranges=courses
    .filter(c=>!c.done)
    .map(c=>getStaffRange(c,name))
    .filter(Boolean)
    .map(r=>({s:toMins(r.start),e:toMins(r.end)}));
  for(let i=0;i<ranges.length;i++){
    for(let j=i+1;j<ranges.length;j++){
      if(ranges[i].s<ranges[j].e&&ranges[j].s<ranges[i].e)return true;
    }
  }
  return false;
}

function switchShop(i){
  currentShop=i;
  document.querySelectorAll('.shop-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.getElementById('shopPanel0').style.display=i===0?'block':'none';
  document.getElementById('shopPanel1').style.display=i===1?'block':'none';
  renderShop(i);
}
function switchInnerTab(si,tab){shops[si].innerTab=tab;save();renderShop(si);}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function confirmAddStaff(){
  const name=document.getElementById('inputStaffName').value.trim();
  if(!name)return;
  shops[currentShop].staff.push({name,working:false});
  save();renderShop(currentShop);closeModal('modalAddStaff');
}
function toggleWorking(si,idx){shops[si].staff[idx].working=!shops[si].staff[idx].working;save();renderShop(si);}
function deleteStaff(si,idx){shops[si].staff.splice(idx,1);save();renderShop(si);}

function openAddCourse(){document.getElementById('inputCourseStart').value=nowStr();openModal('modalAddCourse');}
function confirmAddCourse(){
  const type=parseInt(document.getElementById('inputCourseType').value);
  const start=document.getElementById('inputCourseStart').value;
  if(!start)return;
  shops[currentShop].courses.push({type,start,firstHalf:[],secondHalf:[],extended:0,done:false});
  save();renderShop(currentShop);closeModal('modalAddCourse');
}
function deleteCourse(si,ci){shops[si].courses.splice(ci,1);save();renderShop(si);}
function markDone(si,ci){shops[si].courses[ci].done=!shops[si].courses[ci].done;save();renderShop(si);}

function openAssign(si,ci,half){
  pendingShop=si;pendingCourseIdx=ci;pendingHalf=half;
  const shop=shops[si];
  const course=shop.courses[ci];
  const working=shop.staff.filter(s=>s.working);
  const already=half==='first'?course.firstHalf:course.secondHalf;
  document.getElementById('modalAssignTitle').textContent=half==='first'?'前半 — 女の子をアサイン':'後半 — 女の子をアサイン';
  const list=document.getElementById('girlCheckList');
  list.innerHTML=working.length===0
    ?'<div style="color:#aaa;font-size:13px">出勤中のスタッフがいません</div>'
    :working.map(s=>`<label class="girl-check-item"><input type="checkbox" value="${s.name}" ${already.includes(s.name)?'checked':''}> ${s.name}</label>`).join('');
  openModal('modalAssign');
}
function confirmAssign(){
  const checked=[...document.querySelectorAll('#girlCheckList input:checked')].map(i=>i.value);
  const course=shops[pendingShop].courses[pendingCourseIdx];
  if(pendingHalf==='first')course.firstHalf=checked;else course.secondHalf=checked;
  save();renderShop(pendingShop);closeModal('modalAssign');
}
function removeGirl(si,ci,half,name){
  const c=shops[si].courses[ci];
  if(half==='first')c.firstHalf=c.firstHalf.filter(n=>n!==name);
  else c.secondHalf=c.secondHalf.filter(n=>n!==name);
  save();renderShop(si);
}
function jonaiBtnClick(si,ci){
  const course=shops[si].courses[ci];
  if(course.firstHalf.length===0){alert('前半に女の子がいません');return;}
  const hasSecond=course.secondHalf.length>0;
  if(hasSecond){
    if(!confirm('後半に既にアサインがあります。前半の子で上書きしますか？'))return;
  }else{
    if(!confirm('場内にします。前半の子をそのまま後半にセットします。'))return;
  }
  course.secondHalf=[...course.firstHalf];
  save();renderShop(si);
}
function openExtend(si,ci){
  pendingShop=si;pendingExtCourse=ci;
  const sel=document.getElementById('inputExtend');
  sel.innerHTML=shops[si].extOptions.map(o=>`<option value="${o}">${o}分延長</option>`).join('');
  openModal('modalExtend');
}
function confirmExtend(){
  const mins=parseInt(document.getElementById('inputExtend').value);
  shops[pendingShop].courses[pendingExtCourse].extended=(shops[pendingShop].courses[pendingExtCourse].extended||0)+mins;
  save();renderShop(pendingShop);closeModal('modalExtend');
}
function openEditTime(si,ci){
  pendingShop=si;pendingEditCourse=ci;
  document.getElementById('inputEditTime').value=shops[si].courses[ci].start;
  openModal('modalEditTime');
}
function confirmEditTime(){
  shops[pendingShop].courses[pendingEditCourse].start=document.getElementById('inputEditTime').value;
  save();renderShop(pendingShop);closeModal('modalEditTime');
}

function renderShop(idx){
  const shop=shops[idx];
  const tab=shop.innerTab||0;
  let html=`<div class="inner-tabs">
    <button class="inner-tab${tab===0?' active':''}" onclick="switchInnerTab(${idx},0)">スタッフ</button>
    <button class="inner-tab${tab===1?' active':''}" onclick="switchInnerTab(${idx},1)">コース</button>
    <button class="inner-tab${tab===2?' active':''}" onclick="switchInnerTab(${idx},2)">状況一覧</button>
  </div>`;
  if(tab===0)html+=renderStaffTab(idx);
  else if(tab===1)html+=renderCourseTab(idx);
  else html+=renderStatusTab(idx);
  document.getElementById('shopPanel'+idx).innerHTML=html;
}

function renderStaffTab(idx){
  const shop=shops[idx];
  const working=shop.staff.filter(s=>s.working).length;
  let html=`<div class="panel active"><div class="section-head">
    <span style="font-size:12px;color:#666">出勤中 ${working}人 / 全${shop.staff.length}人</span>
    <button class="btn primary" onclick="document.getElementById('inputStaffName').value='';openModal('modalAddStaff')">＋ 追加</button>
  </div>`;
  if(shop.staff.length===0){html+=`<div class="empty">スタッフを登録してください</div>`;}
  else{
    html+='<div class="grid">';
    shop.staff.forEach((s,si)=>{
      html+=`<div class="card${s.working?' active-staff':''}">
        <button onclick="deleteStaff(${idx},${si})" style="position:absolute;top:5px;right:5px;border:none;background:transparent;cursor:pointer;color:#bbb;font-size:11px">✕</button>
        <div class="card-name" style="margin-bottom:5px">${s.name}</div>
        <span class="badge ${s.working?'free':'off'}">${s.working?'出勤中':'休み'}</span><br>
        <button class="btn" style="margin-top:7px;font-size:11px;width:100%" onclick="toggleWorking(${idx},${si})">${s.working?'退勤':'出勤'}</button>
      </div>`;
    });
    html+='</div>';
  }
  return html+'</div>';
}

function renderCourseTab(idx){
  const shop=shops[idx];
  const active=shop.courses.filter(c=>!c.done);
  let html=`<div class="panel active"><div class="section-head">
    <span style="font-size:12px;color:#666">進行中 ${active.length}本</span>
    <button class="btn primary" onclick="openAddCourse()">＋ コース追加</button>
  </div>`;
  if(shop.courses.length===0){html+=`<div class="empty">コースを追加してください</div>`;}
  else{
    shop.courses.forEach((c,ci)=>{
      const sc=getSchedule(c);
      const ext=c.extended>0?` +${c.extended}分`:'';
      const firstTime=`${c.start} 〜 ${sc.change}`;
      const secondTime=`${sc.change} 〜 ${sc.end}`;
      html+=`<div class="course-card${c.done?' done-card':''}">
        <div class="course-head">
          <span class="course-num">#${ci+1}</span>
          <span style="background:#f0f0f0;border-radius:20px;padding:2px 9px;font-size:11px">${c.type}分${ext}</span>
          <span style="font-size:12px;color:#666">${c.start} → ${sc.end}</span>
          <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap">
            <button class="btn" style="font-size:11px;padding:2px 7px" onclick="openEditTime(${idx},${ci})">時間編集</button>
            <button class="btn info" style="font-size:11px;padding:2px 7px" onclick="jonaiBtnClick(${idx},${ci})">場内</button>
            <button class="btn warn" style="font-size:11px;padding:2px 7px" onclick="openExtend(${idx},${ci})">延長</button>
            <button class="btn danger" style="font-size:11px;padding:2px 7px" onclick="markDone(${idx},${ci})">${c.done?'復元':'終了'}</button>
            <button class="btn" style="font-size:11px;padding:2px 7px" onclick="deleteCourse(${idx},${ci})">削除</button>
          </div>
        </div>
        <div class="half-block">
          <div class="half">
            <div class="half-label">前半</div>
            <div class="half-time">${firstTime}</div>
            <div class="half-girls">${c.firstHalf.map(n=>`<span class="girl-chip">${n}<span class="remove" onclick="removeGirl(${idx},${ci},'first','${n}')">✕</span></span>`).join('')}
            <button class="btn" style="font-size:10px;padding:1px 6px" onclick="openAssign(${idx},${ci},'first')">＋</button></div>
          </div>
          <div class="half">
            <div class="half-label">後半</div>
            <div class="half-time">${secondTime}</div>
            <div class="half-girls">${c.secondHalf.map(n=>`<span class="girl-chip">${n}<span class="remove" onclick="removeGirl(${idx},${ci},'second','${n}')">✕</span></span>`).join('')}
            <button class="btn" style="font-size:10px;padding:1px 6px" onclick="openAssign(${idx},${ci},'second')">＋</button></div>
          </div>
        </div>
        <div class="timeline">
          <span class="tl-item ${tlClass(sc.change)}">場内/チェンジ ${sc.change}</span>
          <span class="tl-item ${tlClass(sc.extNeg)}">延長交渉 ${sc.extNeg}</span>
          ${c.extended>0
            ?`<span class="tl-item extended">延長終了 ${sc.end}</span>`
            :`<span class="tl-item ${tlClass(sc.end)}">終了 ${sc.end}</span>`}
        </div>
      </div>`;
    });
  }
  return html+'</div>';
}

function renderStatusTab(idx){
  const shop=shops[idx];
  const working=shop.staff.filter(s=>s.working);
  let html=`<div class="panel active">`;
  if(working.length===0){html+=`<div class="empty">出勤中のスタッフがいません</div>`;}
  else{
    html+=`<table class="status-table"><thead><tr>
      <th>名前</th><th>状況</th><th>コース</th><th>時間</th>
    </tr></thead><tbody>`;
    working.forEach(s=>{
      const ac=shop.courses.filter(c=>!c.done&&(c.firstHalf.includes(s.name)||c.secondHalf.includes(s.name)));
      const overlap=hasOverlap(shop.courses,s.name);
      const overlapBadge=overlap?`<span class="overlap-badge">⚠ 重複</span>`:'';
      if(ac.length===0){
        html+=`<tr><td><span class="dot free"></span>${s.name}${overlapBadge}</td><td><span class="badge free">空き</span></td><td>—</td><td>—</td></tr>`;
      }else{
        ac.forEach((c,i)=>{
          const ci=shop.courses.indexOf(c);
          const range=getStaffRange(c,s.name);
          const inFirst=c.firstHalf.includes(s.name);
          const inSecond=c.secondHalf.includes(s.name);
          const half=inFirst&&inSecond?'前半/後半':inFirst?'前半':'後半';
          const leaveTime=range?range.end:'—';
          const lc=leaveTime!=='—'?tlClass(leaveTime):'';
          html+=`<tr>
            <td>${i===0?`<span class="dot busy"></span>${s.name}${overlapBadge}`:''}</td>
            <td><span class="badge busy">${half}</span></td>
            <td>#${ci+1} ${c.type}分</td>
            <td style="font-size:12px;${lc==='done'?'color:#a32d2d;font-weight:500':lc==='soon'?'color:#ba7517;font-weight:500':''}">
              ${range?`${range.start} 〜 ${range.end}`:'—'}
            </td>
          </tr>`;
        });
      }
    });
    html+=`</tbody></table>`;
  }
  return html+'</div>';
}

document.getElementById('inputStaffName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddStaff()});
load();
renderShop(0);
renderShop(1);
setInterval(()=>renderShop(currentShop),30000);
</script>
</body>
</html>
